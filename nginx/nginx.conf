server {
    listen 80 default_server;
    server_name _;

    # oauth2-proxy's own endpoints (sign-in, callback, etc.).
    location /oauth2/ {
        proxy_pass       http://oauth2-proxy:4180;
        proxy_set_header Host                    $host;
        proxy_set_header X-Real-IP               $remote_addr;
        proxy_set_header X-Scheme                $scheme;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    # Internal subrequest used by auth_request below. No request body is forwarded.
    location = /oauth2/auth {
        proxy_pass       http://oauth2-proxy:4180;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Scheme         $scheme;
        proxy_set_header Content-Length   "";
        proxy_pass_request_body           off;
    }

    # The protected app.
    location / {
        auth_request /oauth2/auth;

        # Unauthenticated -> bounce to the login flow, returning here afterwards.
        # Relative rd ($request_uri) is always an allowed redirect target.
        error_page 401 = /oauth2/start?rd=$request_uri;

        # Pull the identity oauth2-proxy resolved and forward it to FastAPI.
        auth_request_set $user $upstream_http_x_auth_request_user;
        auth_request_set $pref $upstream_http_x_auth_request_preferred_username;
        proxy_set_header X-Forwarded-User                $user;
        proxy_set_header X-Forwarded-Preferred-Username  $pref;

        proxy_pass http://app:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
