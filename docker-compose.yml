services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # HTTP (8080) stays enabled for the in-network backchannel from oauth2-proxy.
      KC_HTTP_ENABLED: "true"
      # Browser-facing URL is HTTPS; this also fixes the token issuer claim.
      KC_HOSTNAME: https://localhost:8443
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/conf/certs/localhost.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/conf/certs/localhost.key
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./certs:/opt/keycloak/conf/certs:ro
    ports:
      - "8443:8443"
    networks:
      - authnet

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    environment:
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      OAUTH2_PROXY_CLIENT_ID: oauth2-proxy
      # Demo-only secrets. Do NOT use these values in production.
      # CLIENT_SECRET must match the oauth2-proxy client "secret" in keycloak/realm-export.json.
      OAUTH2_PROXY_CLIENT_SECRET: oauth2-proxy-demo-secret
      # COOKIE_SECRET must be exactly 16, 24, or 32 bytes (this is 32).
      OAUTH2_PROXY_COOKIE_SECRET: 0123456789abcdef0123456789abcdef
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      # Keycloak has no client scope literally named "groups"; the groups claim is
      # emitted by a client protocol mapper instead. Request only standard scopes.
      OAUTH2_PROXY_SCOPE: "openid email profile"
      OAUTH2_PROXY_ALLOWED_GROUPS: "/app-users"
      # Browser-facing URLs are HTTPS. Backchannel (redeem/jwks) stays on the
      # in-network HTTP listener, so oauth2-proxy needs no cert trust.
      OAUTH2_PROXY_REDIRECT_URL: https://localhost/oauth2/callback
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://localhost:8443/realms/demo
      OAUTH2_PROXY_SKIP_OIDC_DISCOVERY: "true"
      OAUTH2_PROXY_LOGIN_URL: https://localhost:8443/realms/demo/protocol/openid-connect/auth
      OAUTH2_PROXY_REDEEM_URL: http://keycloak:8080/realms/demo/protocol/openid-connect/token
      OAUTH2_PROXY_OIDC_JWKS_URL: http://keycloak:8080/realms/demo/protocol/openid-connect/certs
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      # Now that everything is HTTPS, the session cookie carries the Secure flag.
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_WHITELIST_DOMAINS: localhost
      OAUTH2_PROXY_UPSTREAMS: static://200
    depends_on:
      - keycloak
    networks:
      - authnet

  app:
    build: ./app
    networks:
      - authnet

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
      - oauth2-proxy
    networks:
      - authnet

networks:
  authnet:
    driver: bridge
