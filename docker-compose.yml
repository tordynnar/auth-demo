services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"
    networks:
      - authnet

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    environment:
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      OAUTH2_PROXY_CLIENT_ID: oauth2-proxy
      # Demo-only secrets. Do NOT use these values in production.
      # CLIENT_SECRET must match the oauth2-proxy client "secret" in keycloak/realm-export.json.
      OAUTH2_PROXY_CLIENT_SECRET: oauth2-proxy-demo-secret
      # COOKIE_SECRET must be exactly 16, 24, or 32 bytes (this is 32).
      OAUTH2_PROXY_COOKIE_SECRET: 0123456789abcdef0123456789abcdef
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      # Keycloak has no client scope literally named "groups"; the groups claim is
      # emitted by a client protocol mapper instead. Request only standard scopes.
      OAUTH2_PROXY_SCOPE: "openid email profile"
      OAUTH2_PROXY_ALLOWED_GROUPS: "/app-users"
      OAUTH2_PROXY_REDIRECT_URL: http://localhost/oauth2/callback
      OAUTH2_PROXY_OIDC_ISSUER_URL: http://localhost:8080/realms/demo
      OAUTH2_PROXY_SKIP_OIDC_DISCOVERY: "true"
      OAUTH2_PROXY_LOGIN_URL: http://localhost:8080/realms/demo/protocol/openid-connect/auth
      OAUTH2_PROXY_REDEEM_URL: http://keycloak:8080/realms/demo/protocol/openid-connect/token
      OAUTH2_PROXY_OIDC_JWKS_URL: http://keycloak:8080/realms/demo/protocol/openid-connect/certs
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_WHITELIST_DOMAINS: localhost
      OAUTH2_PROXY_UPSTREAMS: static://200
    depends_on:
      - keycloak
    networks:
      - authnet

  app:
    build: ./app
    networks:
      - authnet

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app
      - oauth2-proxy
    networks:
      - authnet

networks:
  authnet:
    driver: bridge
